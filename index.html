<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ELK Log Formatter</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

<header>
  <h1>ELK Log Formatter</h1>
</header>

<main>
  <!-- ── Input panel ── -->
  <div class="panel" id="panel-input">
    <div class="panel-header">
      <span class="panel-label">Raw JSON Input</span>
      <div class="panel-header-right">
        <span class="panel-meta" id="input-meta"></span>
        <button class="btn-collapse" id="collapse-input" title="Collapse input">▲</button>
      </div>
    </div>
    <textarea id="input"
      placeholder='Paste Kibana hits or ES|QL results here…&#10;&#10;Kibana: [{"_id":"...","fields":{...}}, ...]&#10;ES|QL: [{"@timestamp":"...","c":"...", ...}, ...]'
      spellcheck="false"
    ></textarea>
  </div>

  <!-- ── Output panel ── -->
  <div class="panel" id="panel-output">
    <div class="panel-header">
      <span class="panel-label">Formatted Output</span>
      <div class="panel-header-right">
        <span class="panel-meta" id="output-meta"></span>
        <button class="btn-collapse" id="btn-sort" title="Toggle sort order">↑ ASC</button>
        <button class="btn-collapse" id="copy-output" title="Copy to clipboard" disabled>⧉ Copy</button>
      </div>
    </div>
    <div class="search-bar">
      <div class="search-input-wrap">
        <input type="text" id="search-input"
          placeholder='Filter: r:"abc" AND c:"Guide" AND ("startup" OR "tune")'
          spellcheck="false" autocomplete="off" />
        <button id="search-clear" title="Clear filter" hidden>✕</button>
      </div>
      <span id="search-meta"></span>
    </div>
    <div id="output-wrap">
      <div id="output"></div>
    </div>
  </div>

  <!-- ── Action bar ── -->
  <div class="action-bar">
    <button id="btn-format">
      Format
    </button>
    <button id="btn-clear">
      ✕ Clear
    </button>
    <span class="status" id="status"></span>
  </div>
</main>

<div id="toast">Copied to clipboard!</div>

<script src="lib/lucene-query-parser.min.js"></script>
<script src="formatter.js"></script>
<script src="search.js"></script>
<script src="ui.js"></script>
</body>
</html>
